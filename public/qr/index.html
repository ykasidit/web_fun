const NAMES = { en: 'English', th: 'ไทย', zh: '中文', vi: 'Tiếng Việt', id: 'Bahasa Indonesia', ms: 'Bahasa Melayu', fil: 'Filipino', my: 'မြန်မာ', lo: 'ລາວ', km: 'ខ្មែរ', es: 'Español', pt: 'Português' };
$('lang').innerHTML = Object.entries(NAMES).map(([k, v]) => `<option value="${k}">${v}</option>`).join('');
function detectLang() {
  const saved = localStorage.getItem('qr_lang');
  if (saved && I18N[saved]) return saved;
  for (const l of navigator.languages || [navigator.language || 'en']) {
    const p = l.toLowerCase().split('-')[0];
    if (I18N[p]) return p;
    if (p === 'tl') return 'fil';
  }
  return 'en';
}
let cur = 'en', dict = I18N.en;
function applyLang(code) {
  cur = code; dict = I18N[code];
  for (const [k, v] of Object.entries(dict)) { if (k !== 'errEmpty') { const el = $(k); if (el) el.textContent = v; } }
  document.documentElement.lang = code;
  $('lang').value = code;
  syncSimpleLabel();
}
function syncSimpleLabel() {
  const t = $('qtype').value;
  $('simpleLabel').textContent = { url: dict.oUrl, text: dict.oText, tel: dict.oTel, mailto: dict.oMailto }[t] ?? dict.oText;
}
$('lang').onchange = () => { localStorage.setItem('qr_lang', $('lang').value); applyLang($('lang').value); };
applyLang(detectLang());

let lastQr = null;
$('qtype').onchange = () => {
  const t = $('qtype').value;
  $('fSimple').classList.toggle('hidden', t === 'wifi' || t === 'vcard');
  $('fWifi').classList.toggle('hidden', t !== 'wifi');
  $('fVcard').classList.toggle('hidden', t !== 'vcard');
  syncSimpleLabel();
};

$('bGen').onclick = () => {
  $('err').textContent = '';
  try {
    const payload = buildPayload($('qtype').value, {
      text: $('text').value, ssid: $('ssid').value, pass: $('pass').value,
      auth: $('auth').value, hidden: $('hiddenNet').checked,
      name: $('vname').value, phone: $('vphone').value, email: $('vemail').value, org: $('vorg').value,
    });
    if (!payload.trim()) { $('err').textContent = dict.errEmpty; return; }
    const ec = $('ec').value;
    const cap = capacityCheck(payload, ec);
    if (cap) { $('err').textContent = cap; return; }
    const qr = qrcode(0, ec); // 0 = auto version
    qr.addData(payload, 'Byte');
    qr.make();
    lastQr = qr;
    const n = qr.getModuleCount(), scale = +$('scale').value, quiet = 4;
    const px = (n + quiet * 2) * scale;
    const c = $('qrcanvas'); c.width = px; c.height = px;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, px, px);
    ctx.fillStyle = '#000';
    for (let r = 0; r < n; r++) for (let col = 0; col < n; col++) {
      if (qr.isDark(r, col)) ctx.fillRect((col + quiet) * scale, (r + quiet) * scale, scale, scale);
    }
    $('out').classList.remove('hidden');
  } catch (e) {
    $('err').textContent = `could not generate: ${e.message || e}`;
  }
};
$('bPng').onclick = () => {
  const a = document.createElement('a');
  a.href = $('qrcanvas').toDataURL('image/png');
  a.download = 'qr.png'; a.click();
};
$('bSvg').onclick = () => {
  if (!lastQr) return;
  const svg = lastQr.createSvgTag({ scalable: true, margin: 4 });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
  a.download = 'qr.svg'; a.click();
  URL.revokeObjectURL(a.href);
};
</script>
