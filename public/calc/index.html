<body>
<div class="window" id="app" tabindex="0">
  <div class="title-bar"><div class="title-bar-text">🧮 ClearEvo.com Calc</div><div class="title-bar-controls"><button class="fontbtn" id="fMinus" type="button" title="smaller text">A-</button><button class="fontbtn" id="fPlus" type="button" title="larger text">A+</button></div></div>

    </div>
  </div>
  <div id="echo"></div>
  <div class="keys" id="keys">
    <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button class="op" data-k="/">/</button><button class="op" data-k="C" title="clear all">C</button>
    <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button class="op" data-k="*">*</button><button class="op" data-k="DEL" title="drop / backspace">DEL</button>
    <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button class="op" data-k="-">-</button><button class="op" data-k="TAB" title="swap top two">swap</button>
    <button data-k="0">0</button><button data-k=".">.</button><button class="op" data-k="n" title="negate">+/-</button><button class="op" data-k="+">+</button><button class="op" data-k="ENTER" title="push / dup">RET</button>
    <button class="op" data-k="Q" title="square root">√</button><button class="op" data-k="^">x^y</button><button class="op" data-k="&" title="1/x">1/x</button><button class="op" data-k="L" title="ln">ln</button><button class="op" data-k="U" title="undo">U undo</button>
  </div>
  </div>
  <div class="status-bar"><p class="status-bar-field">'almost' Emacs M-x calc - RET push/dup, TAB swap, n negate, &amp; 1/x, Q sqrt, U undo, DEL drop - 100% in-browser (Google Analytics: visit stats only - <a href="/tools-privacy/" target="_blank" rel="noopener">verify</a>) - <a href="/blog/2026/07/22/how_to_use_the_emacs_rpn_calculator_in_your_browser/" target="_blank" rel="noopener">how to use</a> - <a href="https://www.clearevo.com/">clearevo</a> - © 2026 Kasidit Yusuf, GPL v2</p></div>

<script type="module">
import { createCalc, pressDigit, enter, op, undo, render } from './logic.js';
const s = createCalc();
const buf = document.getElementById('buf'), echo = document.getElementById('echo');
const trail = document.getElementById('trail');
const draw = (err) => {
  buf.textContent = '--- Emacs Calculator Mode ---\n' + render(s, 12);
  trail.textContent = 'Emacs Calculator Trail\n' + s.trail.join('\n');
  trail.scrollTop = trail.scrollHeight;
  echo.textContent = err || '';
};
function key(k) {
  let err = null;
  if (k === 'ENTER') err = enter(s);
  else if (k === 'E' && s.entry !== '') pressDigit('e', s); // exponent during entry, like calc
  else if (k === 'U') err = undo(s);
  else if (/^[0-9.]$/.test(k)) pressDigit(k, s);
  else if (k === '-' && s.entry === '') pressDigit('-', s); // leading minus
  else err = op(k, s);
  draw(err);
}
document.getElementById('keys').addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (b) { key(b.dataset.k); }
});
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const map = { Enter: 'ENTER', Tab: 'TAB', Backspace: 'DEL', c: 'C', q: 'Q', Q: 'Q', n: 'n', '&': '&', l: 'L', L: 'L', e: 'E', E: 'E', u: 'U', U: 'U' };
  const k = map[e.key] ?? (/^[0-9.+\-*/^%]$/.test(e.key) ? e.key : null);
  if (k != null) { e.preventDefault(); key(k); }
});
draw();
</script>
<script>/* zoom persisted per tool family */
(function(){var z=+localStorage.getItem('ce_zoom')||100;
var ap=function(){document.body.style.zoom=z+'%';try{localStorage.setItem('ce_zoom',z)}catch(e){}};
document.getElementById('fMinus').onclick=function(){z=Math.max(60,z-10);ap();};
document.getElementById('fPlus').onclick=function(){z=Math.min(200,z+10);ap();};
ap();})();
</script>
