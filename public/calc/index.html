<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>almost Emacs calc - RPN calculator in your browser</title>
<meta name="description" content="An affectionate browser imitation of M-x calc, the Emacs RPN stack calculator. Guru key bindings (RET dup, TAB swap, n negate, & invert, Q sqrt) plus buttons for normal human beings. 100% client-side.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧮</text></svg>">
<link rel="canonical" href="https://www.clearevo.com/calc/">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-H457QK43L6"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-H457QK43L6');</script>
<style>
html,body{height:100%;margin:0;background:#bdbdbd;font-family:'DejaVu Sans Mono','Courier New',monospace}
.frame{display:flex;flex-direction:column;position:absolute;inset:6px;border:1px solid #555;background:#fff;max-width:560px;margin:auto}
.menubar{background:#d6d0c8;border-bottom:1px solid #888;padding:2px 4px;font-size:12px;user-select:none}
.bufs{flex:1;display:flex;min-height:0}
.bufcol{flex:1;display:flex;flex-direction:column;min-width:0}
.trailcol{border-left:1px solid #888;flex:0 0 40%}
#buf{flex:1;overflow-y:auto;padding:6px 8px;font-size:18px;white-space:pre}
#trail{flex:1;overflow-y:auto;padding:6px 8px;font-size:13px;white-space:pre;color:#444}
.modeline{background:#000;color:#fff;font-size:12px;padding:1px 8px;user-select:none;white-space:nowrap;overflow:hidden}
#echo{font-size:13px;padding:3px 8px;color:#a00;min-height:1.2em}
.keys{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:6px;background:#d6d0c8;border-top:1px solid #888}
.keys button{font:inherit;font-size:15px;padding:7px 0;cursor:pointer}
.keys button.op{background:#efe7d6}
</style>
</head>
<body>
<div class="frame" tabindex="0" id="frame">
  <div class="menubar">'almost' Emacs M-x calc (RPN) - RET push/dup, TAB swap, n negate, &amp; 1/x, Q sqrt, U undo, DEL drop - <a href="/blog/2026/07/22/how_to_use_the_emacs_rpn_calculator_in_your_browser/" target="_blank" rel="noopener">how to use</a> - <a href="https://www.clearevo.com/">clearevo</a></div>
  <div class="bufs">
    <div class="bufcol">
      <div id="buf"></div>
      <div class="modeline">--%*-Calc: 12 Deg       (Calculator)</div>
    </div>
    <div class="bufcol trailcol">
      <div id="trail"></div>
      <div class="modeline">--%*- *Calc Trail*</div>
    </div>
  </div>
  <div id="echo"></div>
  <div class="keys" id="keys">
    <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button class="op" data-k="/">/</button><button class="op" data-k="C" title="clear all">C</button>
    <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button class="op" data-k="*">*</button><button class="op" data-k="DEL" title="drop / backspace">DEL</button>
    <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button class="op" data-k="-">-</button><button class="op" data-k="TAB" title="swap top two">swap</button>
    <button data-k="0">0</button><button data-k=".">.</button><button class="op" data-k="n" title="negate">+/-</button><button class="op" data-k="+">+</button><button class="op" data-k="ENTER" title="push / dup">RET</button>
    <button class="op" data-k="Q" title="square root">√</button><button class="op" data-k="^">x^y</button><button class="op" data-k="&" title="1/x">1/x</button><button class="op" data-k="L" title="ln">ln</button><button class="op" data-k="U" title="undo">U undo</button>
  </div>
</div>
<script type="module">
import { createCalc, pressDigit, enter, op, undo, render } from './logic.js';
const s = createCalc();
const buf = document.getElementById('buf'), echo = document.getElementById('echo');
const trail = document.getElementById('trail');
const draw = (err) => {
  buf.textContent = '--- Emacs Calculator Mode ---\n' + render(s, 12);
  trail.textContent = 'Emacs Calculator Trail\n' + s.trail.join('\n');
  trail.scrollTop = trail.scrollHeight;
  echo.textContent = err || '';
};
function key(k) {
  let err = null;
  if (k === 'ENTER') err = enter(s);
  else if (k === 'E' && s.entry !== '') pressDigit('e', s); // exponent during entry, like calc
  else if (k === 'U') err = undo(s);
  else if (/^[0-9.]$/.test(k)) pressDigit(k, s);
  else if (k === '-' && s.entry === '') pressDigit('-', s); // leading minus
  else err = op(k, s);
  draw(err);
}
document.getElementById('keys').addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (b) { key(b.dataset.k); }
});
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const map = { Enter: 'ENTER', Tab: 'TAB', Backspace: 'DEL', c: 'C', q: 'Q', Q: 'Q', n: 'n', '&': '&', l: 'L', L: 'L', e: 'E', E: 'E', u: 'U', U: 'U' };
  const k = map[e.key] ?? (/^[0-9.+\-*/^%]$/.test(e.key) ? e.key : null);
  if (k != null) { e.preventDefault(); key(k); }
});
draw();
</script>
</body>
</html>
